name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    uses: ./.github/workflows/reusable-validate.yml

  # v2.0.0-rc.37 F5: Windows path smoke. Catches POSIX-only path / shebang /
  # tmpdir assumptions before they ship. Minimum suite — just the shared
  # contract surface (atomic-write / path resolve / minimatch) and the CLI
  # smoke (--help / --version) — full vitest matrix lives on Linux to keep
  # CI minutes bounded.
  windows-smoke:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm -r build

      # Cross-platform contract surface only (atomic-write / schema / path /
      # store-core). Excludes the perf gate (Linux-calibrated thresholds), the
      # git-roundtrip test-wall (heavy, POSIX git harness), and the migration
      # script import (Linux-only full-matrix concern) — per the job's
      # "minimum suite; full vitest matrix lives on Linux" intent above.
      - name: Shared contract-surface smoke
        run: pnpm --filter @fenglimg/fabric-shared test:smoke

      - name: CLI surface smoke
        run: |
          node packages/cli/dist/index.js --help
          node packages/cli/dist/index.js --version
        shell: bash
