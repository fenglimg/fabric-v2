name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm -r exec tsc --noEmit

      - name: Run package tests
        run: pnpm -r --if-present test

      - name: Lint protected tokens
        run: node --experimental-strip-types scripts/lint-protected-tokens.ts

      - name: Verify NO_COLOR snapshots
        run: NO_COLOR=1 pnpm --filter @fenglimg/fabric-cli test
