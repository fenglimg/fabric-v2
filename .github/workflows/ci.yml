name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace (needed for cross-package typechecks)
        run: pnpm -r build

      - name: Typecheck workspace
        run: pnpm -r exec tsc --noEmit

      - name: Lint (knip zero-baseline)
        run: pnpm lint

      - name: Run package tests with coverage
        run: pnpm -r --if-present test:coverage

      - name: Lint protected tokens
        run: node --experimental-strip-types scripts/lint-protected-tokens.ts

      - name: Verify NO_COLOR snapshots
        run: NO_COLOR=1 pnpm --filter @fenglimg/fabric-cli test

      # v2.0.0-rc.37 NEW-35: perf benchmark gate. Measures CLI + hook cold
      # start p95 against generous CI budgets (CI VMs are loaded). Local dev
      # box typically sees p95 ~150ms (CLI) / ~110ms (hook); CI budget
      # ~10x to absorb VM noise without going silent.
      - name: Perf benchmark (CLI + hook cold start p95 gate)
        run: node scripts/perf-benchmark.mjs > perf-report.json

      - name: Upload perf report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: perf-report.json

  # v2.0.0-rc.37 F5: Windows path smoke. Catches POSIX-only path / shebang /
  # tmpdir assumptions before they ship. Minimum suite — just the shared
  # contract surface (atomic-write / path resolve / minimatch) and the CLI
  # smoke (--help / --version) — full vitest matrix lives on Linux to keep
  # CI minutes bounded.
  windows-smoke:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm -r build

      - name: Shared schema + atomic-write tests
        run: pnpm --filter @fenglimg/fabric-shared test

      - name: CLI surface smoke
        run: node packages/cli/dist/index.js --version
        shell: bash
