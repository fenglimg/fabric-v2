name: Reusable Validate

on:
  workflow_call:
    inputs:
      verify_tag:
        required: false
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify synced versions (and tag/version coherence)
        if: ${{ inputs.verify_tag }}
        run: node scripts/sync-versions.mjs --tag "${GITHUB_REF_NAME}"

      - name: Build workspace (needed for cross-package typechecks)
        run: pnpm -r build

      - name: Typecheck workspace
        run: pnpm -r exec tsc --noEmit

      - name: Lint (knip zero-baseline)
        run: pnpm lint

      - name: Run package tests with coverage
        run: pnpm -r --if-present test:coverage

      - name: Testing strategy drift gate
        run: pnpm test:strategy

      - name: Store-only mounted workflow E2E
        run: pnpm test:store-only-e2e

      - name: Upgrade path E2E (stale hook/skill refresh)
        run: pnpm test:upgrade-e2e

      - name: Lint protected tokens
        run: node --experimental-strip-types scripts/lint-protected-tokens.ts

      # Slim: do NOT re-run the entire CLI suite (already covered above with coverage).
      # Only reskin/i18n snapshot files that intentionally assert NO_COLOR output.
      - name: Verify NO_COLOR snapshots (scoped)
        run: >
          NO_COLOR=1 pnpm --filter @fenglimg/fabric-cli exec vitest run
          __tests__/i18n.test.ts
          __tests__/install-renderer-reskin.test.ts
          __tests__/doctor-reskin.test.ts
          __tests__/hud-reskin.test.ts

      - name: Perf benchmark (CLI + hook cold start p95 gate)
        run: node scripts/perf-benchmark.mjs > perf-report.json

      - name: Upload perf report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-report
          path: perf-report.json
