name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  ci:
    uses: ./.github/workflows/reusable-validate.yml
    with:
      verify_tag: true

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply tag version to all package manifests
        run: node scripts/apply-tag-version.mjs "${GITHUB_REF_NAME}"

      - name: Build packages
        run: pnpm -r build

      - name: Publish packages
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [[ "$tag" == *-* ]]; then
            echo "Prerelease tag detected ($tag) — publishing under dist-tag 'next'"
            pnpm -r publish --access public --no-git-checks --tag next
          else
            echo "Stable tag detected ($tag) — publishing under dist-tag 'latest'"
            pnpm -r publish --access public --no-git-checks
          fi

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract CHANGELOG section for this tag
        id: changelog
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          # Pull the section between '## [<version>]' and the next '## [' header.
          # Falls back to a brief autogen note if the section is missing.
          if grep -q "^## \[${version}\]" CHANGELOG.md; then
            awk -v ver="${version}" '
              $0 ~ "^## \\[" ver "\\]" { capture=1; print; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md > release_notes.md
          else
            echo "Release ${tag}" > release_notes.md
            echo "" >> release_notes.md
            echo "(CHANGELOG section not found — see [CHANGELOG.md](./CHANGELOG.md) for details.)" >> release_notes.md
          fi
          echo "Extracted release notes:"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          prerelease: ${{ contains(github.ref_name, '-rc.') || contains(github.ref_name, '-beta.') || contains(github.ref_name, '-alpha.') }}
          generate_release_notes: false
