name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify synced versions (and tag/version coherence)
        run: node scripts/sync-versions.mjs --tag "${GITHUB_REF_NAME}"

      - name: Build workspace
        run: pnpm -r build

      - name: Typecheck workspace
        run: pnpm -r exec tsc --noEmit

      - name: Lint (knip zero-baseline)
        run: pnpm lint

      - name: Run package tests with coverage
        run: pnpm -r --if-present test:coverage

      - name: Lint protected tokens
        run: node --experimental-strip-types scripts/lint-protected-tokens.ts

      - name: Verify NO_COLOR snapshots
        run: NO_COLOR=1 pnpm --filter @fenglimg/fabric-cli test

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply tag version to all package manifests
        run: node scripts/apply-tag-version.mjs "${GITHUB_REF_NAME}"

      - name: Build packages
        run: pnpm -r build

      - name: Publish packages
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [[ "$tag" == *-* ]]; then
            echo "Prerelease tag detected ($tag) — publishing under dist-tag 'next'"
            pnpm -r publish --access public --no-git-checks --tag next
          else
            echo "Stable tag detected ($tag) — publishing under dist-tag 'latest'"
            pnpm -r publish --access public --no-git-checks
          fi
