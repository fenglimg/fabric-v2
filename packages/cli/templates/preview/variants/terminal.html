<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terminal · Fabric 知识预览</title>
<meta name="variant-desc" content="IDE/终端暗色风 · 高密度三层树形导航" />
<style>
  :root {
    /* 暗色模式变量 (默认) */
    --bg: #18181c;
    --sidebar-bg: #111113;
    --surface: #1e1e24;
    --surface-hover: #282830;
    --border: #2d2d34;
    --border-focus: #52b8ff;
    --text-main: #abb2bf;
    --text-bright: #ecebe8;
    --text-muted: #5c6370;
    --accent: #52b8ff;
    --accent-bg: rgba(82, 184, 255, 0.1);
    
    /* Scopes 强调色 */
    --color-team: #00f5d4;
    --color-project: #3b82f6;
    --color-personal: #d946ef;
    --color-other: #94a3b8;
    
    /* Types 强调色 */
    --color-decisions: #ff5c7c;
    --color-pitfalls: #f59e0b;
    --color-guidelines: #10b981;
    --color-models: #0ea5e9;
    --color-processes: #a855f7;
    
    /* Maturities 颜色 */
    --color-draft: #94a3b8;
    --color-verified: #10b981;
    --color-proven: #3b82f6;
    
    --radius: 4px;
    --mono: "Fira Code", ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
  }

  [data-theme="light"] {
    --bg: #f6f8fa;
    --sidebar-bg: #eaecef;
    --surface: #ffffff;
    --surface-hover: #f1f3f5;
    --border: #d0d7de;
    --border-focus: #0969da;
    --text-main: #24292f;
    --text-bright: #09090b;
    --text-muted: #57606a;
    --accent: #0969da;
    --accent-bg: rgba(9, 105, 218, 0.08);
    
    /* Scopes 强调色 */
    --color-team: #0d9488;
    --color-project: #0969da;
    --color-personal: #b784a7;
    --color-other: #6e7781;
    
    /* Types 强调色 */
    --color-decisions: #cf222e;
    --color-pitfalls: #9a6700;
    --color-guidelines: #1a7f37;
    --color-models: #0969da;
    --color-processes: #8250df;
    
    /* Maturities 颜色 */
    --color-draft: #57606a;
    --color-verified: #1a7f37;
    --color-proven: #0969da;
    
    --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: var(--sans); background: var(--bg); color: var(--text-main); font-size: 14px; line-height: 1.5; }
  
  /* 整体容器设计：仿真 IDE 窗口 */
  .ide-container {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
  }

  /* 顶部标题栏 */
  .ide-header {
    height: 38px;
    background: var(--sidebar-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    justify-content: space-between;
    user-select: none;
  }
  .window-dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .window-dots span {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
  }
  .window-dots .dot-red { background: #ff5f56; }
  .window-dots .dot-yellow { background: #ffbd2e; }
  .window-dots .dot-green { background: #27c93f; }
  
  .ide-title {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }
  
  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .theme-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-main);
    padding: 3px 8px;
    font-size: 11px;
    font-family: var(--mono);
    border-radius: var(--radius);
    cursor: pointer;
  }
  .theme-toggle:hover {
    background: var(--surface-hover);
    color: var(--text-bright);
  }

  /* 命令过滤条 */
  .command-bar {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .search-line {
    display: flex;
    align-items: center;
    background: var(--sidebar-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 10px;
    font-family: var(--mono);
  }
  .search-line:focus-within {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 1px var(--border-focus);
  }
  .prompt-symbol {
    color: var(--accent);
    margin-right: 8px;
    font-weight: bold;
    user-select: none;
  }
  .search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 13px;
    padding: 4px 0;
  }
  .search-count {
    color: var(--text-muted);
    font-size: 11px;
    user-select: none;
  }
  
  /* 快速过滤标签 */
  .quick-filters {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    overflow-x: auto;
    scrollbar-width: none; /* Firefox */
  }
  .quick-filters::-webkit-scrollbar { display: none; } /* Chrome/Safari */
  .filter-label {
    color: var(--text-muted);
    user-select: none;
  }
  .filter-btn {
    background: var(--sidebar-bg);
    border: 1px solid var(--border);
    color: var(--text-main);
    padding: 2px 6px;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
  }
  .filter-btn:hover {
    border-color: var(--text-muted);
    color: var(--text-bright);
  }
  .filter-btn.active {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* 主体双栏布局 */
  .ide-layout {
    display: flex;
    flex: 1;
    height: calc(100% - 38px - 66px - 24px); /* 减去 Header, CommandBar, StatusBar */
    overflow: hidden;
  }

  /* 侧边栏：文件树结构 */
  .ide-sidebar {
    width: 320px;
    min-width: 260px;
    max-width: 450px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  
  /* 树形行通用样式 */
  .tree-row {
    display: flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 24px;
    height: 24px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    padding-right: 12px;
  }
  .tree-row:hover {
    background: var(--surface-hover);
  }
  .tree-row.active {
    background: var(--accent-bg);
  }
  .tree-row.active .tree-title {
    color: var(--text-bright);
    font-weight: 500;
  }
  
  /* 树节点前缀与缩进 */
  .tree-indent {
    color: var(--text-muted);
    opacity: 0.5;
    letter-spacing: -0.5px;
    white-space: pre;
  }
  .tree-toggle-icon {
    font-family: var(--mono);
    color: var(--text-muted);
    margin-right: 4px;
    width: 14px;
    text-align: center;
    display: inline-block;
  }
  
  /* Scope 节点样式 */
  .tree-row.scope {
    font-weight: bold;
    color: var(--text-bright);
    position: relative;
    border-left: 3px solid transparent;
    padding-left: 9px; /* 3px border + 9px padding = 12px align */
  }
  .tree-row.scope .tree-label {
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tree-row.scope .tree-badge {
    margin-left: auto;
    font-size: 10px;
    background: var(--surface);
    color: var(--text-muted);
    padding: 1px 5px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  /* Type 节点样式 */
  .tree-row.type {
    padding-left: 12px;
  }
  .tree-row.type .tree-label {
    font-weight: bold;
  }
  .tree-row.type .tree-badge {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-muted);
  }

  /* Entry 节点样式 */
  .tree-row.entry {
    padding-left: 12px;
  }
  .tree-iid {
    color: var(--text-muted);
    margin-right: 6px;
    font-weight: normal;
  }
  .tree-title {
    color: var(--text-main);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .tree-maturity-indicator {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
  }

  /* 右侧主内容区 */
  .ide-main {
    flex: 1;
    background: var(--bg);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .main-container {
    padding: 24px 32px 64px;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
  }

  /* 欢迎面 / 空白面 */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
    flex: 1;
    height: 100%;
  }
  .ascii-banner {
    font-family: var(--mono);
    color: var(--accent);
    white-space: pre;
    font-size: 11px;
    line-height: 1.3;
    margin-bottom: 24px;
    text-align: left;
    user-select: none;
  }
  .quick-tips {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--sidebar-bg);
    border: 1px solid var(--border);
    padding: 16px 24px;
    border-radius: var(--radius);
    max-width: 500px;
    text-align: left;
    color: var(--text-main);
    box-shadow: var(--shadow);
  }
  .quick-tips ul {
    margin: 8px 0 0 0;
    padding-left: 18px;
  }
  .quick-tips li {
    margin: 4px 0;
  }
  .keyboard-shortcut {
    background: var(--surface);
    color: var(--accent);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid var(--border);
    font-size: 11px;
  }

  /* 仪表盘统计面板 */
  .welcome-dashboard {
    margin-top: 24px;
    width: 100%;
    max-width: 500px;
    background: var(--sidebar-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: left;
  }
  .dashboard-title {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: bold;
    color: var(--text-bright);
    margin-bottom: 12px;
    border-bottom: 1px dashed var(--border);
    padding-bottom: 6px;
  }
  .stat-row {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    font-family: var(--mono);
    font-size: 11px;
  }
  .stat-label {
    width: 120px;
    color: var(--text-main);
  }
  .stat-bar-container {
    flex: 1;
    height: 8px;
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
    margin: 0 10px;
  }
  .stat-bar {
    height: 100%;
    border-radius: 4px;
  }
  .stat-value {
    width: 40px;
    text-align: right;
    color: var(--text-bright);
  }

  /* 知识条目详情头部 */
  .entry-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 24px;
  }
  .entry-meta-path {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .entry-meta-path span {
    color: var(--accent);
  }
  .entry-title {
    font-size: 24px;
    font-weight: 600;
    color: var(--text-bright);
    margin: 0 0 16px 0;
    line-height: 1.3;
  }

  /* IDE 属性网格风格 */
  .meta-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
    background: var(--sidebar-bg);
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 12px;
  }
  .meta-item {
    display: flex;
    align-items: center;
  }
  .meta-key {
    color: var(--text-muted);
    width: 90px;
    flex-shrink: 0;
    user-select: none;
  }
  .meta-val {
    color: var(--text-bright);
    display: flex;
    align-items: center;
    gap: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  
  /* 方括号特色标签 */
  .tag-bracket {
    border: 1px solid currentColor;
    padding: 0px 6px;
    font-size: 11px;
    border-radius: 2px;
    font-weight: bold;
    display: inline-block;
    background: rgba(0,0,0,0.05);
  }
  [data-theme="dark"] .tag-bracket {
    background: rgba(255,255,255,0.03);
  }
  
  .tags-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .tag-hash {
    color: var(--accent);
  }

  /* Markdown 正文排版 */
  .md-body {
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--text-main);
  }
  .md-body h1, .md-body h2, .md-body h3, .md-body h4 {
    color: var(--text-bright);
    font-weight: 600;
    line-height: 1.35;
    margin: 1.6em 0 0.6em 0;
  }
  .md-body h1 { font-size: 20px; border-bottom: 1px dashed var(--border); padding-bottom: 4px; }
  .md-body h2 { font-size: 17.5px; border-bottom: 1px dashed var(--border); padding-bottom: 4px; }
  .md-body h3 { font-size: 15px; }
  .md-body h4 { font-size: 14px; }
  
  /* 在终端风里，标题前可以带一个装饰符 */
  .md-body h1::before, .md-body h2::before, .md-body h3::before {
    content: "# ";
    color: var(--text-muted);
    font-weight: normal;
  }
  
  .md-body p { margin: 0.8em 0; }
  
  .md-body ul, .md-body ol {
    margin: 0.8em 0;
    padding-left: 20px;
  }
  .md-body li {
    margin: 0.3em 0;
  }
  .md-body ul li {
    list-style-type: none;
    position: relative;
  }
  /* 终端风格的列表符号 */
  .md-body ul li::before {
    content: "▪";
    position: absolute;
    left: -14px;
    color: var(--accent);
    font-size: 10px;
    top: 1px;
  }
  
  .md-body code {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--sidebar-bg);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--text-bright);
  }
  
  /* IDE 风格的代码块 */
  .terminal-code-block {
    background: #0f1013;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 1.2em 0;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  [data-theme="light"] .terminal-code-block {
    background: #f8f9fa;
  }
  .code-header {
    background: var(--sidebar-bg);
    border-bottom: 1px solid var(--border);
    height: 30px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-family: var(--mono);
    font-size: 11px;
    justify-content: space-between;
    user-select: none;
  }
  .code-header .dots {
    display: flex;
    gap: 6px;
  }
  .code-header .dots span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .code-header .dots .dot-r { background: #ff5f56; }
  .code-header .dots .dot-y { background: #ffbd2e; }
  .code-header .dots .dot-g { background: #27c93f; }
  
  .code-lang {
    color: var(--text-muted);
    font-weight: bold;
    font-size: 10px;
    letter-spacing: 0.5px;
  }
  .copy-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    cursor: pointer;
  }
  .copy-btn:hover {
    color: var(--text-bright);
    border-color: var(--text-muted);
  }
  
  .terminal-code-block pre {
    margin: 0;
    padding: 10px 0;
    overflow-x: auto;
  }
  .terminal-code-block code {
    background: none;
    border: none;
    padding: 0;
    display: block;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.5;
    color: #abb2bf;
  }
  [data-theme="light"] .terminal-code-block code {
    color: #24292e;
  }
  
  /* 行号样式 */
  .code-line {
    display: flex;
    padding: 0 12px;
  }
  .code-line:hover {
    background: rgba(255,255,255,0.03);
  }
  [data-theme="light"] .code-line:hover {
    background: rgba(0,0,0,0.02);
  }
  .line-num {
    color: var(--text-muted);
    width: 28px;
    text-align: right;
    margin-right: 12px;
    user-select: none;
    font-size: 11px;
    opacity: 0.7;
  }
  .line-content {
    white-space: pre;
  }

  /* 引用块 */
  .md-body blockquote {
    margin: 1.2em 0;
    padding: 8px 16px;
    border-left: 4px solid var(--accent);
    background: var(--sidebar-bg);
    color: var(--text-main);
    border-radius: 0 var(--radius) var(--radius) 0;
    font-style: italic;
  }
  .md-body blockquote::before {
    content: "NOTE > ";
    font-family: var(--mono);
    font-size: 11px;
    font-weight: bold;
    color: var(--accent);
    display: block;
    margin-bottom: 4px;
    font-style: normal;
  }
  
  .md-body a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dashed var(--accent);
  }
  .md-body a:hover {
    border-bottom-style: solid;
  }
  .md-body hr {
    border: none;
    border-top: 1px dashed var(--border);
    margin: 1.6em 0;
  }
  
  /* 表格 */
  .md-body table {
    border-collapse: collapse;
    width: 100%;
    margin: 1.2em 0;
    font-family: var(--mono);
    font-size: 12.5px;
  }
  .md-body th, .md-body td {
    border: 1px solid var(--border);
    padding: 6px 12px;
    text-align: left;
  }
  .md-body th {
    background: var(--sidebar-bg);
    color: var(--text-bright);
    font-weight: bold;
  }
  .md-body tr:nth-child(even) {
    background: rgba(255,255,255,0.01);
  }
  [data-theme="light"] .md-body tr:nth-child(even) {
    background: rgba(0,0,0,0.01);
  }

  /* 底部状态栏 */
  .ide-statusbar {
    height: 24px;
    background: var(--accent);
    color: #000000; /* 高对比暗色字 */
    font-family: var(--mono);
    font-size: 11px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    justify-content: space-between;
    font-weight: 500;
    user-select: none;
  }
  
  /* 亮色模式下状态栏也需要很好的对比度 */
  [data-theme="light"] .ide-statusbar {
    background: var(--accent);
    color: #ffffff;
  }
  
  .statusbar-left, .statusbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .statusbar-mode {
    background: rgba(0,0,0,0.15);
    padding: 1px 6px;
    border-radius: 2px;
    font-weight: bold;
  }
  [data-theme="light"] .statusbar-mode {
    background: rgba(255,255,255,0.2);
  }
  .statusbar-sep {
    opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="ide-container">
    <!-- 顶部 header -->
    <div class="ide-header">
      <div class="window-dots">
        <span class="dot-red"></span>
        <span class="dot-yellow"></span>
        <span class="dot-green"></span>
      </div>
      <div class="ide-title">pcf://preview/terminal.html</div>
      <div class="header-actions">
        <button class="theme-toggle" id="themebtn">THEME: DARK</button>
      </div>
    </div>
    
    <!-- 命令行搜索/过滤栏 -->
    <div class="command-bar">
      <div class="search-line">
        <span class="prompt-symbol">$</span>
        <span style="color:var(--text-muted); margin-right:4px; user-select:none;">filter --query</span>
        <input id="search" class="search-input" type="text" placeholder="输入关键字、tag、scope 或 type..." autocomplete="off" />
        <span class="search-count" id="matchcount">0/0 entries</span>
      </div>
      <div class="quick-filters" id="quickfilters">

        <button class="filter-btn" data-filter="type:decisions">type:decision</button>
        <button class="filter-btn" data-filter="type:pitfalls">type:pitfall</button>

        <span class="statusbar-mode" id="sbmode">NORMAL</span>
        <span class="statusbar-sep">|</span>
        <span id="sbfile">No entry selected</span>
      </div>
      <div class="statusbar-right">
        <span id="sbkeys">[/] Search  [↑↓] Navigate  [Enter] Toggle  [Esc] Clear</span>
        <span class="statusbar-sep">|</span>
        <span id="sbstatus">● LIVE</span>
        <span class="statusbar-sep">|</span>
        <span>UTF-8</span>

<script>
(() => {
  "use strict";

  // 核心状态数据
  const state = {
    entries: [],
    byId: new Map(),
    selectedId: null,
    revision: null,
    query: "",
    collapsedScopes: new Set(),
    collapsedTypes: new Set(),
    visibleEntryIds: [] // 平铺的可见 Entry ID 列表，用于键盘导航
  };

  // 类型标签映射
  const TYPE_LABEL = {
    decisions: "decision",
    pitfalls: "pitfall",
    guidelines: "guideline",
    models: "model",
    processes: "process"
  };

  const TYPE_SORT_ORDER = ["decisions", "pitfalls", "guidelines", "models", "processes"];

  // 取得 Scope 颜色变量
  function getScopeColor(scope) {
    if (scope === "team") return "var(--color-team)";
    if (scope === "personal") return "var(--color-personal)";
    if (scope.startsWith("project:")) return "var(--color-project)";
    return "var(--color-other)";
  }

  // 取得 Type 颜色变量
  function getTypeColor(type) {
    return `var(--color-${type})`;
  }

  // Scope 友好名称与排序等级
  function getScopeLabel(scope) {
    if (scope === "team") return "TEAM (团队通用)";
    if (scope === "personal") return "PERSONAL (个人)";
    if (scope.startsWith("project:")) return `PROJECT:${scope.slice("project:".length).toUpperCase()}`;
    return scope.toUpperCase();
  }

  function getScopeRank(scope) {
    if (scope === "team") return [0, ""];
    if (scope.startsWith("project:")) return [1, scope];
    if (scope === "personal") return [2, ""];
    return [3, scope];
  }

  // HTML 转义
  const esc = (s) => s.replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  // 自定义极简 Markdown 渲染器
  function renderInline(text) {
    let s = esc(text);
    // 行内代码
    s = s.replace(/`([^`]+)`/g, (_, c) => "<code>" + c + "</code>");
    // 粗体
    s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    // 斜体
    s = s.replace(/(^|[\s(])\*([^*\s][^*]*?)\*(?=[\s).,]|$)/g, "$1<em>$2</em>");
    s = s.replace(/(^|[\s(])_([^_\s][^_]*?)_(?=[\s).,]|$)/g, "$1<em>$2</em>");
    // 链接
    s = s.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    return s;
  }

  function renderMarkdown(md) {
    const lines = md.replace(/\r\n/g, "\n").split("\n");
    const out = [];
    let i = 0;
    
    const flushList = (buf, ordered) => {
      if (!buf.length) return;
      out.push("<" + (ordered ? "ol" : "ul") + ">" + buf.map((x) => "<li>" + renderInline(x) + "</li>").join("") + "</" + (ordered ? "ol" : "ul") + ">");
      buf.length = 0;
    };

    while (i < lines.length) {
      const line = lines[i];

      // 1. 代码块 ```
      const fence = /^```(\w*)\s*$/.exec(line);
      if (fence) {
        const lang = fence[1] || "plaintext";
        const codeLines = [];
        i++;
        while (i < lines.length && !/^```\s*$/.test(lines[i])) {
          codeLines.push(lines[i]);
          i++;
        }
        i++; // 跳过闭合 ```
        
        // 构造带行号的 IDE 风格代码块
        const codeRows = codeLines.map((ln, idx) => {
          return `<div class="code-line"><span class="line-num">${idx + 1}</span><span class="line-content">${esc(ln)}</span></div>`;
        }).join("");

        out.push(
          `<div class="terminal-code-block">` +
            `<div class="code-header">` +
              `<span class="dots"><span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span></span>` +
              `<span class="code-lang">${lang.toUpperCase()}</span>` +
              `<button class="copy-btn" onclick="navigator.clipboard.writeText(this.nextElementSibling.querySelector('code').innerText).then(() => { this.innerText='COPIED'; setTimeout(() => this.innerText='COPY', 1200); })">COPY</button>` +
            `</div>` +
            `<pre><code>${codeRows}</code></pre>` +
          `</div>`
        );
        continue;
      }

      // 2. 标题 h1 - h4
      const heading = /^(#{1,4})\s+(.*)$/.exec(line);
      if (heading) {
        const level = heading[1].length;
        out.push(`<h${level}>` + renderInline(heading[2]) + `</h${level}>`);
        i++;
        continue;
      }

      // 3. 无序列表
      if (/^\s*[-*+]\s+/.test(line)) {
        const buf = [];
        while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
          buf.push(lines[i].replace(/^\s*[-*+]\s+/, ""));
          i++;
        }
        flushList(buf, false);
        continue;
      }

      // 4. 有序列表
      if (/^\s*\d+\.\s+/.test(line)) {
        const buf = [];
        while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
          buf.push(lines[i].replace(/^\s*\d+\.\s+/, ""));
          i++;
        }
        flushList(buf, true);
        continue;
      }

      // 5. 引用块
      if (/^\s*>\s?/.test(line)) {
        const buf = [];
        while (i < lines.length && /^\s*>\s?/.test(lines[i])) {
          buf.push(lines[i].replace(/^\s*>\s?/, ""));
          i++;
        }
        out.push("<blockquote>" + renderInline(buf.join(" ")) + "</blockquote>");
        continue;
      }

      // 6. 分割线
      if (/^\s*(-{3,}|\*{3,})\s*$/.test(line)) {
        out.push("<hr />");
        i++;
        continue;
      }

      // 空白行
      if (line.trim() === "") {
        i++;
        continue;
      }

      // 7. 段落 (合并连续非空白、非结构行)
      const para = [];
      while (i < lines.length && lines[i].trim() !== "" && !/^(#{1,4}\s|```|\s*[-*+]\s|\s*\d+\.\s|\s*>|\s*-{3,}\s*$)/.test(lines[i])) {
        para.push(lines[i]);
        i++;
      }
      out.push("<p>" + renderInline(para.join(" ")) + "</p>");
    }

    return out.join("\n");
  }

  // 高级查询匹配：支持前缀检索（如 scope:team，type:decision，tag:xx，maturity:xx）
  function matchesQuery(entry, q) {
    if (!q) return true;
    
    // 如果查询包含前缀模式
    const parts = q.split(/\s+/);
    return parts.every(part => {
      if (!part) return true;
      
      if (part.includes(":")) {
        const [prefix, val] = part.split(":");
        if (!val) return true;
        
        if (prefix === "scope") {
          return entry.scope.toLowerCase().includes(val.toLowerCase());
        }
        if (prefix === "type") {
          const typeLabel = TYPE_LABEL[entry.type] || entry.type;
          return entry.type.toLowerCase().includes(val.toLowerCase()) || typeLabel.toLowerCase().includes(val.toLowerCase());
        }
        if (prefix === "tag") {
          return (entry.tags || []).some(t => t.toLowerCase().includes(val.toLowerCase()));
        }
        if (prefix === "maturity") {
          return (entry.maturity || "").toLowerCase().includes(val.toLowerCase());
        }
      }
      
      // 普通全文检索
      const hay = (entry.id + " " + entry.title + " " + entry.scope + " " + entry.type + " " + (entry.tags || []).join(" ")).toLowerCase();
      return hay.includes(part);
    });
  }

  // 渲染侧边栏树形目录
  function renderSidebar() {
    const q = state.query.trim().toLowerCase();
    const visible = state.entries.filter((e) => matchesQuery(e, q));
    
    // 更新状态栏和匹配计数
    document.getElementById("matchcount").textContent = `${visible.length}/${state.entries.length} entries`;
    
    const sidebar = document.getElementById("sidebar");
    sidebar.innerHTML = "";
    state.visibleEntryIds = []; // 重置平铺列表

    if (!visible.length) {
      sidebar.innerHTML = '<div style="color:var(--text-muted); font-family:var(--mono); font-size:12px; padding:24px; text-align:center;">No matching entries.</div>';
      return;
    }

    // 1. 组织树结构：Scope -> Type -> Entry
    const tree = {};
    for (const e of visible) {
      if (!tree[e.scope]) tree[e.scope] = {};
      if (!tree[e.scope][e.type]) tree[e.scope][e.type] = [];
      tree[e.scope][e.type].push(e);
    }

    // 2. 对 Scope 进行排序
    const sortedScopes = Object.keys(tree).sort((a, b) => {
      const ra = getScopeRank(a), rb = getScopeRank(b);
      return ra[0] - rb[0] || ra[1].localeCompare(rb[1]);
    });

    // 3. 构建并绘制树形 DOM 节点
    for (let sIdx = 0; sIdx < sortedScopes.length; sIdx++) {
      const scope = sortedScopes[sIdx];
      const scopeColor = getScopeColor(scope);
      const typesObj = tree[scope];
      
      // 取得该 Scope 下所有的 active types，并按预设顺序排序
      const activeTypes = Object.keys(typesObj).sort((a, b) => {
        return TYPE_SORT_ORDER.indexOf(a) - TYPE_SORT_ORDER.indexOf(b);
      });

      // 计算该 Scope 包含的所有可见 entry 数
      let scopeTotalCount = 0;
      for (const t of activeTypes) {
        scopeTotalCount += typesObj[t].length;
      }

      // 创建 Scope Row (顶层)
      const scopeId = scope;
      const isScopeCollapsed = state.collapsedScopes.has(scopeId);
      const scopeRow = document.createElement("div");
      scopeRow.className = "tree-row scope";
      scopeRow.style.borderLeftColor = scopeColor;
      
      const toggleScopeIcon = isScopeCollapsed ? "▶" : "▼";
      scopeRow.innerHTML = 
        `<span class="tree-toggle-icon">${toggleScopeIcon}</span>` +
        `<span class="tree-label">${esc(getScopeLabel(scope))}</span>` +
        `<span class="tree-badge">${scopeTotalCount}</span>`;
      
      scopeRow.addEventListener("click", () => {
        if (state.collapsedScopes.has(scopeId)) {
          state.collapsedScopes.delete(scopeId);
        } else {
          state.collapsedScopes.add(scopeId);
        }
        renderSidebar();
      });
      sidebar.appendChild(scopeRow);

      // 如果 Scope 折叠了，就不需要画它底下的 Type 和 Entry
      if (isScopeCollapsed) continue;

      // 4. 绘制第二层：Types
      for (let tIdx = 0; tIdx < activeTypes.length; tIdx++) {
        const type = activeTypes[tIdx];
        const entries = typesObj[type].sort((a, b) => a.id.localeCompare(b.id));
        
        const typeId = `${scope}:${type}`;
        const isTypeCollapsed = state.collapsedTypes.has(typeId);
        const isLastType = tIdx === activeTypes.length - 1;
        
        // 计算 Type 节点的连接线前缀
        const typePrefix = isLastType ? "└── " : "├── ";
        
        const typeRow = document.createElement("div");
        typeRow.className = "tree-row type";
        
        const toggleTypeIcon = isTypeCollapsed ? "+" : "-";
        const typeColor = getTypeColor(type);
        
        typeRow.innerHTML = 
          `<span class="tree-indent">${typePrefix}</span>` +
          `<span class="tree-toggle-icon">[${toggleTypeIcon}]</span>` +
          `<span class="tree-label" style="color:${typeColor}">[${esc(TYPE_LABEL[type] || type).toUpperCase()}]</span>` +
          `<span class="tree-badge">(${entries.length})</span>`;
        
        typeRow.addEventListener("click", (evt) => {
          evt.stopPropagation();
          if (state.collapsedTypes.has(typeId)) {
            state.collapsedTypes.delete(typeId);
          } else {
            state.collapsedTypes.add(typeId);
          }
          renderSidebar();
        });
        sidebar.appendChild(typeRow);

        // 如果 Type 折叠了，就不画它下面的 Entry
        if (isTypeCollapsed) continue;

        // 5. 绘制第三层：Entries
        for (let eIdx = 0; eIdx < entries.length; eIdx++) {
          const entry = entries[eIdx];
          const isLastEntry = eIdx === entries.length - 1;
          
          // 继承父级 Type 的缩进线，并画出 Entry 自身的连接线
          const indentStr = (isLastType ? "    " : "│   ") + (isLastEntry ? "└── " : "├── ");
          
          const entryRow = document.createElement("div");
          entryRow.className = "tree-row entry" + (entry.id === state.selectedId ? " active" : "");
          
          // 成熟度小圆点色值
          let maturityColor = "transparent";
          if (entry.maturity === "draft") maturityColor = "var(--color-draft)";
          if (entry.maturity === "verified") maturityColor = "var(--color-verified)";
          if (entry.maturity === "proven") maturityColor = "var(--color-proven)";

          entryRow.innerHTML = 
            `<span class="tree-indent">${indentStr}</span>` +
            `<span class="tree-iid">${esc(entry.id)}</span>` +
            `<span class="tree-title">${esc(entry.title)}</span>` +
            `<span class="tree-maturity-indicator" style="background:${maturityColor}" title="Maturity: ${entry.maturity || 'unknown'}"></span>`;
          
          entryRow.addEventListener("click", (evt) => {
            evt.stopPropagation();
            selectEntry(entry.id);
          });
          
          sidebar.appendChild(entryRow);
          
          // 收集可见 Entry，为了键盘导航
          state.visibleEntryIds.push(entry.id);
        }
      }
    }
  }

  // 绘制欢迎面及总体统计
  function renderWelcomeDashboard() {
    const total = state.entries.length;
    if (!total) return;

    // 统计分布
    const scopeCounts = { team: 0, project: 0, personal: 0 };
    const typeCounts = { decisions: 0, pitfalls: 0, guidelines: 0, models: 0, processes: 0 };
    const maturityCounts = { draft: 0, verified: 0, proven: 0, empty: 0 };

    for (const e of state.entries) {
      if (e.scope === "team") scopeCounts.team++;

    }

    const pct = (cnt) => ((cnt / total) * 100).toFixed(1);

    const mainPanel = document.getElementById("mainpanel");
    mainPanel.innerHTML = `
      <div class="empty-state">
        <div class="ascii-banner">
  ██████╗  ██████╗███████╗    ████████╗███████╗██████╗ ███╗   ███╗██╗███╗   ██╗ █████╗ ██╗
  ██╔══██╗██╔════╝██╔════╝    ╚══██╔══╝██╔════╝██╔══██╗████╗ ████║██║████╗  ██║██╔══██╗██║
  ██████╔╝██║     █████╗         ██║   █████╗  ██████╔╝██╔████╔██║██║██╔██╗ ██║███████║██║
  ██╔═══╝ ██║     ██╔══╝         ██║   ██╔══╝  ██╔══██╗██║╚██╔╝██║██║██║╚██╗██║██╔══██║██║
  ██║     ╚██████╗██║            ██║   ███████╗██║  ██║██║ ╚═╝ ██║██║██║ ╚████║██║  ██║███████╗
  ╚═╝      ╚═════╝╚═╝            ╚═╝   ╚══════╝╚═╝  ╚═╝╚═╝     ╚═╝╚═╝╚═╝  ╚═══╝╚═╝  ╚═╝╚══════╝
        </div>
        <div class="quick-tips">
          <strong>KNOWLEDGE PREVIEW TERMINAL v2.0</strong>
          <ul>
            <li>按 <span class="keyboard-shortcut">/</span> 聚焦并输入命令过滤库</li>

            <li>点击侧栏或标题的 Scope/Type 标签可直接触发关联搜索</li>
          </ul>
        </div>

        <div class="welcome-dashboard">
          <div class="dashboard-title">库数据分布概览 (TOTAL: ${total})</div>
          
          <div style="font-weight:bold; color:var(--text-bright); font-size:11px; margin:6px 0; font-family:var(--mono);">[SCOPES]</div>
          <div class="stat-row">

            </div>
            <span class="stat-value">${scopeCounts.project}</span>
          </div>

            <span class="stat-label">PERSONAL 个人</span>
            <div class="stat-bar-container">
              <div class="stat-bar" style="width:${pct(scopeCounts.personal)}%; background:var(--color-personal);"></div>
            </div>
            <span class="stat-value">${scopeCounts.personal}</span>
          </div>

          <div style="font-weight:bold; color:var(--text-bright); font-size:11px; margin:14px 0 6px 0; font-family:var(--mono);">[TYPES]</div>
          <div class="stat-row">
            <span class="stat-label">DECISION 决策</span>
            <div class="stat-bar-container">
              <div class="stat-bar" style="width:${pct(typeCounts.decisions)}%; background:var(--color-decisions);"></div>
            </div>
            <span class="stat-value">${typeCounts.decisions}</span>
          </div>

            <span class="stat-label">PITFALL 踩坑</span>

              <div class="stat-bar" style="width:${pct(typeCounts.processes)}%; background:var(--color-processes);"></div>

            <span class="stat-value">${typeCounts.processes}</span>

  // 渲染选中 Entry 详情
  function renderEntry(e) {
    const mainPanel = document.getElementById("mainpanel");
    
    const scopeLabel = getScopeLabel(e.scope);
    const scopeColor = getScopeColor(e.scope);
    
    const typeLabel = (TYPE_LABEL[e.type] || e.type).toLowerCase();
    const typeColor = getTypeColor(e.type);
    
    // 成熟度标签
    let maturityHtml = "";
    if (e.maturity) {
      let matColor = "var(--color-other)";
      if (e.maturity === "draft") matColor = "var(--color-draft)";
      if (e.maturity === "verified") matColor = "var(--color-verified)";
      if (e.maturity === "proven") matColor = "var(--color-proven)";
      maturityHtml = `<span class="tag-bracket" style="color:${matColor}">${e.maturity.toUpperCase()}</span>`;
    }

    // 标签解析
    const tagsHtml = (e.tags || []).map(tg => {
      return `<span style="cursor:pointer;" onclick="filterByTag('${esc(tg)}')"><span class="tag-hash">#</span>${esc(tg)}</span>`;
    }).join(", ");

    // 修改底部状态栏显示当前文件路径
    document.getElementById("sbfile").textContent = `${e.scope.replace(':', '/')} > ${e.type} > ${e.id}.md`;

    mainPanel.innerHTML = `
      <div class="main-container">
        <!-- 头部面包屑 -->
        <div class="entry-meta-path">
          KNOWLEDGE_ROOT / <span style="color:${scopeColor}; cursor:pointer;" onclick="filterByScope('${esc(e.scope)}')">${esc(e.scope.toUpperCase())}</span> / <span style="color:${typeColor}; cursor:pointer;" onclick="filterByType('${esc(e.type)}')">${esc(typeLabel.toUpperCase())}</span> / ${esc(e.id)}
        </div>
        
        <!-- 标题 -->
        <h1 class="entry-title">${esc(e.title)}</h1>
        
        <!-- 键值对属性网格 -->
        <div class="meta-grid">
          <div class="meta-item">
            <span class="meta-key">[SCOPE]</span>
            <span class="meta-val" style="color:${scopeColor}; cursor:pointer;" onclick="filterByScope('${esc(e.scope)}')">${esc(scopeLabel)}</span>
          </div>
          <div class="meta-item">
            <span class="meta-key">[TYPE]</span>
            <span class="meta-val" style="color:${typeColor}; cursor:pointer;" onclick="filterByType('${esc(e.type)}')">
              <span class="tag-bracket" style="color:${typeColor}">[${esc(typeLabel.toUpperCase())}]</span>
            </span>
          </div>
          <div class="meta-item">
            <span class="meta-key">[MATURITY]</span>
            <span class="meta-val">${maturityHtml || '<span style="color:var(--text-muted)">NONE</span>'}</span>
          </div>
          <div class="meta-item">
            <span class="meta-key">[ID]</span>
            <span class="meta-val" style="color:var(--text-bright)">${esc(e.id)}</span>
          </div>
          <div class="meta-item">
            <span class="meta-key">[STORE]</span>
            <span class="meta-val">${esc(e.store)}</span>
          </div>
          <div class="meta-item" style="grid-column: 1 / -1;">
            <span class="meta-key">[TAGS]</span>
            <span class="meta-val tags-list">${tagsHtml || '<span style="color:var(--text-muted)">none</span>'}</span>
          </div>
        </div>
        
        <!-- 正文 -->
        <hr style="border:none; border-top:1px solid var(--border); margin:24px 0;" />
        <div class="md-body">
          ${renderMarkdown(e.body || "")}
        </div>
      </div>
    `;
    mainPanel.scrollTop = 0;
  }

  // 选中一个条目
  function selectEntry(id) {
    state.selectedId = id;
    const e = state.byId.get(id);
    if (e) {
      renderEntry(e);
    } else {
      document.getElementById("sbfile").textContent = "No entry selected";
      renderWelcomeDashboard();
    }
    renderSidebar();
  }

  // 点击标签快捷过滤
  window.filterByScope = (scope) => {
    setSearchQuery(`scope:${scope}`);
  };

  window.filterByType = (type) => {
    setSearchQuery(`type:${type}`);
  };

  window.filterByTag = (tag) => {
    setSearchQuery(`tag:${tag}`);
  };

  function setSearchQuery(val) {
    const searchInput = document.getElementById("search");
    searchInput.value = val;
    state.query = val;
    
    // 更新 Quick Filter 选中状态
    updateQuickFilterUI(val);
    
    renderSidebar();
    
    // 如果没有条目匹配，则回到欢迎页
    const q = val.trim().toLowerCase();
    const visible = state.entries.filter((e) => matchesQuery(e, q));
    if (visible.length && state.selectedId && visible.some(e => e.id === state.selectedId)) {
      // 保持选中
    } else if (visible.length) {
      selectEntry(visible[0].id);
    } else {
      selectEntry(null);
    }
  }

  function updateQuickFilterUI(query) {
    const btns = document.querySelectorAll(".filter-btn");
    btns.forEach(btn => {
      const filterVal = btn.getAttribute("data-filter");
      if (filterVal === query) {
        btn.classList.add("active");
      } else if (filterVal === "scope:project:" && query.startsWith("scope:project:")) {
        btn.classList.add("active");
      } else {
        btn.classList.remove("active");
      }
    });
  }

  // 状态栏连接状态更新
  function setStatus(text, live) {
    const sbStatus = document.getElementById("sbstatus");
    if (live) {
      sbStatus.textContent = "● LIVE";
      sbStatus.style.color = ""; // 恢复默认
    } else {
      sbStatus.textContent = `○ OFFLINE (${text})`;
      sbStatus.style.color = "var(--color-decisions)"; // 使用警示红
    }
  }

  // 主数据拉取
  async function loadKnowledge() {
    try {
      const res = await fetch("/api/knowledge", { cache: "no-store" });
      const data = await res.json();
      state.entries = data.entries || [];
      state.byId = new Map(state.entries.map((e) => [e.id, e]));
      
      // 渲染树状目录
      renderSidebar();
      
      // 渲染主内容（欢迎面或之前选中的条目）
      if (state.selectedId && state.byId.has(state.selectedId)) {
        renderEntry(state.byId.get(state.selectedId));
      } else {
        renderWelcomeDashboard();
      }
      setStatus("已同步", true);
    } catch (err) {
      setStatus("数据加载失败", false);
    }
  }

  // 轮询更新
  async function pollRevision() {
    try {
      const res = await fetch("/api/revision", { cache: "no-store" });
      const { revision } = await res.json();
      if (state.revision !== null && revision !== state.revision) {
        await loadKnowledge();
      }
      state.revision = revision;
      setStatus("同步中", true);
    } catch (_) {
      setStatus("失去连接", false);
    }
  }

  // 搜索框输入监听
  const searchInput = document.getElementById("search");
  searchInput.addEventListener("input", (ev) => {
    state.query = ev.target.value;
    updateQuickFilterUI(ev.target.value);
    renderSidebar();
    
    // 输入过滤时，如果当前没有选中，或选中的已被过滤，自动选第一个匹配项
    const q = state.query.trim().toLowerCase();
    const visible = state.entries.filter((e) => matchesQuery(e, q));
    if (visible.length) {
      const alreadySelectedVisible = visible.some(e => e.id === state.selectedId);
      if (!alreadySelectedVisible) {
        selectEntry(visible[0].id);
      }
    } else {
      selectEntry(null);
    }
  });

  // 键盘模式切换：显示在状态栏
  searchInput.addEventListener("focus", () => {
    document.getElementById("sbmode").textContent = "SEARCH";
  });
  searchInput.addEventListener("blur", () => {
    document.getElementById("sbmode").textContent = "NORMAL";
  });

  // 快速过滤按钮点击事件绑定
  document.getElementById("quickfilters").addEventListener("click", (ev) => {
    const btn = ev.target.closest(".filter-btn");
    if (!btn) return;
    const filterValue = btn.getAttribute("data-filter");
    setSearchQuery(filterValue);
  });

  // 键盘快捷键监听
  document.addEventListener("keydown", (e) => {
    // 1. "/" 键：聚焦搜索
    if (e.key === "/") {
      if (document.activeElement !== searchInput) {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
      }
      return;
    }

    // 2. "Escape" 键：退出搜索或清空
    if (e.key === "Escape") {
      if (document.activeElement === searchInput) {
        searchInput.blur();
      } else {
        setSearchQuery("");
      }
      return;
    }

    // 3. 上下键：切换 Entry
    if (e.key === "ArrowDown" || e.key === "ArrowUp") {
      if (!state.visibleEntryIds.length) return;
      e.preventDefault();
      
      let currIdx = state.visibleEntryIds.indexOf(state.selectedId);
      if (e.key === "ArrowDown") {
        currIdx = (currIdx + 1) % state.visibleEntryIds.length;
      } else {
        currIdx = (currIdx - 1 + state.visibleEntryIds.length) % state.visibleEntryIds.length;
      }
      
      selectEntry(state.visibleEntryIds[currIdx]);
      
      // 保持侧边栏激活行可见
      setTimeout(() => {
        const activeRow = document.querySelector(".tree-row.entry.active");
        if (activeRow) activeRow.scrollIntoView({ block: "nearest" });
      }, 0);
      return;
    }

    // 4. "Enter" 键：折叠/展开当前选中条目的父 Scope / Type
    if (e.key === "Enter") {
      if (document.activeElement === searchInput) {
        // 如果在输入框按回车，使输入框失焦
        searchInput.blur();
        return;
      }
      if (state.selectedId) {
        const activeEntry = state.byId.get(state.selectedId);
        if (activeEntry) {
          // 折叠/展开对应的 type
          const typeId = `${activeEntry.scope}:${activeEntry.type}`;
          if (state.collapsedTypes.has(typeId)) {
            state.collapsedTypes.delete(typeId);
          } else {
            state.collapsedTypes.add(typeId);
          }
          renderSidebar();
        }
      }
    }
  });

  // 主题切换逻辑
  const themeBtn = document.getElementById("themebtn");
  function toggleTheme() {
    const currTheme = document.documentElement.getAttribute("data-theme") || "dark";
    const nextTheme = currTheme === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", nextTheme);
    themeBtn.textContent = `THEME: ${nextTheme.toUpperCase()}`;
    localStorage.setItem("pcf-theme", nextTheme);
  }
  themeBtn.addEventListener("click", toggleTheme);

  // 初始化主题设置
  const initTheme = localStorage.getItem("pcf-theme") || "dark";
  document.documentElement.setAttribute("data-theme", initTheme);
  themeBtn.textContent = `THEME: ${initTheme.toUpperCase()}`;

  // 启动初始化和定时器
  loadKnowledge()
    .then(pollRevision)
    .catch((err) => setStatus("加载失败", false));
  
  setInterval(pollRevision, 4000);
})();
</script>
</body>
</html>
