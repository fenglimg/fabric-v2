<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aurora×Terminal · Lumen 知识预览</title>
<meta name="variant-desc" content="亮色极光风结合终端利落条目与键盘导航预览页" />
<!-- offline: 用系统字体栈(--sans/--mono 已含 -apple-system/ui-monospace 兜底),不引外部 Google Fonts -->
<style>
  /* --------------------------------------------------------
   * Design System & Themes (Lumen Light-Focused Fusion)
   * -------------------------------------------------------- */
  :root {
    /* Base Neutral Palette - Aurora Bright Theme */
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface-2: #edf0f4;
    --surface-hover: #f1f3f6;
    --border: rgba(0, 0, 0, 0.06);
    --border-strong: rgba(0, 0, 0, 0.12);
    --text: #1d1d1f;
    --text-secondary: #48484a;
    --text-tertiary: #86868b;
    --accent: #2563eb;
    --accent-light: rgba(37, 99, 235, 0.08);
    
    /* Scope Color Tokens */
    --scope-team-color: #0d9488;
    --scope-team-bg: rgba(13, 148, 136, 0.05);
    --scope-team-bg-hover: rgba(13, 148, 136, 0.09);
    --scope-team-border: rgba(13, 148, 136, 0.15);
    
    --scope-project-color: #2563eb;
    --scope-project-bg: rgba(37, 99, 235, 0.05);
    --scope-project-bg-hover: rgba(37, 99, 235, 0.09);
    --scope-project-border: rgba(37, 99, 235, 0.15);
    
    --scope-personal-color: #7c3aed;
    --scope-personal-bg: rgba(124, 58, 237, 0.05);
    --scope-personal-bg-hover: rgba(124, 58, 237, 0.09);
    --scope-personal-border: rgba(124, 58, 237, 0.15);
    
    /* Type Color Tokens */
    --type-decision-color: #f97316;
    --type-decision-bg: rgba(249, 115, 22, 0.08);
    --type-pitfall-color: #ef4444;
    --type-pitfall-bg: rgba(239, 68, 68, 0.08);
    --type-guideline-color: #0ea5e9;
    --type-guideline-bg: rgba(14, 165, 233, 0.08);
    --type-model-color: #6366f1;
    --type-model-bg: rgba(99, 102, 241, 0.08);
    --type-process-color: #10b981;
    --type-process-bg: rgba(16, 185, 129, 0.08);
    
    /* Maturity Color Tokens */
    --maturity-draft-color: #64748b;
    --maturity-draft-bg: rgba(100, 116, 139, 0.08);
    --maturity-verified-color: #10b981;
    --maturity-verified-bg: rgba(16, 185, 129, 0.08);
    --maturity-proven-color: #d97706;
    --maturity-proven-bg: rgba(217, 119, 6, 0.08);

    /* Layout & Fonts */
    --radius: 12px;
    --radius-sm: 6px;
    --radius-lg: 16px;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --mono: "Fira Code", ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
    --shadow: 0 4px 20px -2px rgba(0,0,0,0.05), 0 2px 8px -1px rgba(0,0,0,0.03);
  }

  [data-theme="dark"] {
    /* Aurora Dark Theme */
    --bg: #090a0f;
    --surface: #12131a;
    --surface-2: #1c1d26;
    --surface-hover: #22232f;
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.12);
    --text: #f5f6f9;
    --text-secondary: #a0a5b5;
    --text-tertiary: #6c7284;
    --accent: #60a5fa;
    --accent-light: rgba(96, 165, 250, 0.15);
    
    /* Scope Colors */
    --scope-team-color: #2dd4bf;
    --scope-team-bg: rgba(45, 212, 191, 0.08);
    --scope-team-bg-hover: rgba(45, 212, 191, 0.14);
    --scope-team-border: rgba(45, 212, 191, 0.2);
    
    --scope-project-color: #60a5fa;
    --scope-project-bg: rgba(96, 165, 250, 0.08);
    --scope-project-bg-hover: rgba(96, 165, 250, 0.14);
    --scope-project-border: rgba(96, 165, 250, 0.2);
    
    --scope-personal-color: #a78bfa;
    --scope-personal-bg: rgba(167, 139, 250, 0.08);
    --scope-personal-bg-hover: rgba(167, 139, 250, 0.14);
    --scope-personal-border: rgba(167, 139, 250, 0.2);
    
    /* Type Colors */
    --type-decision-color: #fb923c;
    --type-decision-bg: rgba(251, 146, 60, 0.12);
    --type-pitfall-color: #fb7185;
    --type-pitfall-bg: rgba(251, 113, 133, 0.12);
    --type-guideline-color: #38bdf8;
    --type-guideline-bg: rgba(56, 189, 248, 0.12);
    --type-model-color: #818cf8;
    --type-model-bg: rgba(129, 140, 248, 0.12);
    --type-process-color: #34d399;
    --type-process-bg: rgba(52, 211, 153, 0.12);
    
    /* Maturity Colors */
    --maturity-draft-color: #94a3b8;
    --maturity-draft-bg: rgba(148, 163, 184, 0.12);
    --maturity-verified-color: #34d399;
    --maturity-verified-bg: rgba(52, 211, 153, 0.12);
    --maturity-proven-color: #fbbf24;
    --maturity-proven-bg: rgba(251, 191, 36, 0.12);

    --shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
  }

  /* --------------------------------------------------------
   * Reset & Base Styles
   * -------------------------------------------------------- */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  
  /* Aurora Background Spots */
  .aurora-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .aurora-circle {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.04;
    transition: opacity 0.5s ease;
  }
  [data-theme="dark"] .aurora-circle {
    opacity: 0.12;
    filter: blur(130px);
  }
  .aurora-1 { top: -10%; left: -10%; width: 45vw; height: 45vw; background: radial-gradient(circle, var(--scope-team-color) 0%, transparent 70%); }
  .aurora-2 { top: 30%; right: -15%; width: 40vw; height: 40vw; background: radial-gradient(circle, var(--scope-project-color) 0%, transparent 70%); }
  .aurora-3 { bottom: -10%; left: 20%; width: 35vw; height: 35vw; background: radial-gradient(circle, var(--scope-personal-color) 0%, transparent 70%); }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }
  [data-theme="dark"] header {
    background: rgba(18, 19, 26, 0.7);
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--scope-team-color), var(--scope-project-color), var(--scope-personal-color));
  }

  .brand {
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }
  .brand span {
    color: var(--text-tertiary);
    font-weight: 400;
  }
  .brand-logo {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: linear-gradient(135deg, var(--scope-team-color), var(--scope-personal-color));
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }

  .search-wrapper {
    position: relative;
    flex: 1;
    max-width: 480px;
    display: flex;
    align-items: center;
  }
  .search-icon {
    position: absolute;
    left: 12px;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    pointer-events: none;
  }
  #search {
    width: 100%;
    padding: 8px 45px 8px 36px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface-2);
    color: var(--text);
    outline: none;
    transition: all 0.2s ease;
  }
  #search:focus {
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 3px var(--accent-light);
  }
  .search-kbd {
    position: absolute;
    right: 12px;
    padding: 2px 5px;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-tertiary);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    pointer-events: none;
  }

  .status {
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface-2);
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-tertiary);
    position: relative;
  }
  .dot.live {
    background: var(--scope-team-color);
  }
  .dot.live::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: inherit;
    animation: pulse 1.8s infinite ease-in-out;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(2.8); opacity: 0; }
  }

  .theme-toggle {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .theme-toggle:hover {
    background: var(--surface-hover);
    color: var(--text);
    border-color: var(--border-strong);
  }

  /* --------------------------------------------------------
   * Layout & Navigation
   * -------------------------------------------------------- */
  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    flex: 1;
    min-height: 0; /* flex 子项默认 min-height:auto 会撑高子内容→滚动区塌陷,置 0 让网格行 = flex 分配高度 */
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  /* Sidebar Container */
  .ide-sidebar {
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  [data-theme="dark"] .ide-sidebar {
    background: rgba(18, 19, 26, 0.4);
  }

  .sidebar-toolbar {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  .toolbar-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .sort-selector {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .sort-label {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-right: 4px;
    white-space: nowrap;
  }
  .sort-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 500;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .sort-btn:hover {
    background: var(--surface-hover);
    color: var(--text);
  }
  .sort-btn.active {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  .quick-filters {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .filter-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 2px 6px;
    font-size: 11px;
    font-weight: 500;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .filter-btn:hover {
    background: var(--surface-hover);
    color: var(--text);
  }
  .filter-btn.active {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  .sidebar-scroll {
    flex: 1;
    min-height: 0; /* 同上:让 flex:1 的滚动区在父高度内滚动,而非被内容撑高 */
    overflow-y: auto;
    padding: 12px;
  }

  /* Tree & Entry Rows */
  .tree-row {
    display: flex;
    align-items: center;
    font-family: var(--sans);
    font-size: 13px;
    height: 30px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    padding: 0 10px;
    border-radius: var(--radius-sm);
    margin-bottom: 2px;
    transition: all 0.15s ease;
  }
  .tree-row:hover {
    background: var(--surface-hover);
  }
  .tree-row.active {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 600;
  }
  .tree-row.scope {
    font-weight: 600;
    color: var(--text);
    margin-top: 8px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    height: 32px;
  }
  .tree-row.scope .tree-label {
    flex: 1;
    margin-left: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tree-row.scope .scope-icon {
    display: flex;
    align-items: center;
  }
  .tree-row.scope .tree-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 10px;
  }

  .tree-indent {
    font-family: var(--mono);
    color: var(--text-tertiary);
    opacity: 0.5;
    letter-spacing: 0; /* -0.5px 会让盒线连字符互相重叠,看着糊 */
    white-space: pre;
    flex-shrink: 0;
    margin-right: 6px; /* 缩进符↔toggle/id 徽章留间距,不再贴在一起(原 gap=0) */
  }
  .tree-toggle-icon {
    font-family: var(--mono);
    color: var(--text-tertiary);
    margin-right: 4px;
    width: 14px;
    text-align: center;
    display: inline-block;
    flex-shrink: 0;
  }

  .tree-row.type {
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding-left: 26px; /* 缩进一级(scope 之下),取代 ASCII 连线 */
  }
  .tree-row.type .tree-label {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px; /* 盾牌图标↔[DECISION] 呼吸空间(原 4px 太挤) */
    overflow: hidden;
  }
  .tree-row.type .type-icon {
    display: flex;
    align-items: center;
    margin-left: 6px; /* toggle [-]↔盾牌图标 分开 */
  }
  .tree-row.type .tree-badge {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-tertiary);
  }

  .tree-row.entry {
    color: var(--text-secondary);
    padding-left: 48px;  /* 缩进二级:type 之下 */
    margin-bottom: 0;    /* 条目连续排列,让竖向引导线不断开 */
    position: relative;
  }
  /* 淡竖向引导线:表示这些条目归属于上方 type(VS Code / Notion 风,取代 │ 连线) */
  .tree-row.entry::before {
    content: "";
    position: absolute;
    left: 33px;
    top: 0;
    bottom: 0;
    width: 1.5px;
    background: var(--border);
  }
  .tree-row.entry:hover {
    color: var(--text);
  }
  .tree-row.entry.active {
    color: var(--accent);
    background: var(--accent-light);
  }
  
  /* Aligned Monospaced ID */
  .tree-iid {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-tertiary);
    background: var(--surface-2);
    padding: 1px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
    margin-right: 8px;
    width: 96px; /* 容下完整 11 字符 id(如 KT-DEC-0032),不再溢出盖到标题 */
    text-align: center;
    overflow: hidden; /* 兜底:超长 id 裁切而非溢出重叠 */
    flex-shrink: 0;
    display: inline-block;
  }
  .tree-row.entry.active .tree-iid {
    background: var(--surface);
    border-color: var(--accent);
    color: var(--accent);
  }
  
  .tree-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tree-maturity-indicator {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-left: 8px;
    flex-shrink: 0;
  }
  
  /* Maturity Dot Styling */
  .tree-maturity-indicator.maturity-draft {
    border: 1px solid var(--text-tertiary);
  }
  .tree-maturity-indicator.maturity-verified {
    background-color: var(--maturity-verified-color);
  }
  .tree-maturity-indicator.maturity-proven {
    background-color: var(--maturity-proven-color);
    box-shadow: 0 0 5px var(--maturity-proven-color);
  }

  /* Flat List Row Styles */
  .flat-scope-icon {
    display: flex;
    align-items: center;
    margin-right: 6px;
    flex-shrink: 0;
  }
  .flat-type-badge {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 2px 5px;
    border-radius: 4px;
    margin-right: 8px;
    font-family: var(--sans);
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.03);
    line-height: 1;
  }

  .empty-sidebar {
    color: var(--text-tertiary);
    font-size: 13px;
    text-align: center;
    padding: 40px 16px;
  }

  /* --------------------------------------------------------
   * Main Reading Panel
   * -------------------------------------------------------- */
  main {
    overflow-y: auto;
    padding: 32px 48px 120px;
    display: flex;
    justify-content: center;
  }
  .content-container {
    width: 100%;
    max-width: 840px;
    position: relative;
  }

  /* Dashboard Overview */
  .dashboard {
    opacity: 0;
    animation: fadeIn 0.4s forwards ease-out;
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .dash-hero {
    margin-bottom: 32px;
  }
  .dash-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
    color: var(--text);
  }
  .dash-subtitle {
    font-size: 14px;
    color: var(--text-tertiary);
  }

  /* Stats Grid */
  .dash-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .stat-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.04);
  }
  .stat-card.card-team { border-color: var(--scope-team-border); }
  .stat-card.card-project { border-color: var(--scope-project-border); }
  .stat-card.card-personal { border-color: var(--scope-personal-border); }

  .stat-bg-icon {
    position: absolute;
    right: -10px;
    bottom: -10px;
    opacity: 0.04;
    color: var(--text);
    pointer-events: none;
  }
  .card-team .stat-bg-icon { color: var(--scope-team-color); opacity: 0.06; }
  .card-project .stat-bg-icon { color: var(--scope-project-color); opacity: 0.06; }
  .card-personal .stat-bg-icon { color: var(--scope-personal-color); opacity: 0.06; }

  .stat-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .card-team .stat-header { color: var(--scope-team-color); }
  .card-project .stat-header { color: var(--scope-project-color); }
  .card-personal .stat-header { color: var(--scope-personal-color); }

  .stat-value {
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-tertiary);
  }

  .dash-subgrid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 24px;
  }
  
  .dash-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .panel-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text);
  }

  /* Type Distribution */
  .type-distribution {
    display: flex;
    flex-direction: column;
    gap: 12px;

  window.copyCodeBlock = function(btn) {
    const block = btn.closest('.terminal-code-block');

    navigator.clipboard.writeText(code).then(() => {
      btn.textContent = 'COPIED';
      setTimeout(() => { btn.textContent = 'COPY'; }, 1200);
    }).catch(err => {

    });
  };

  function getScopeColor(scope) {
    if (scope === "team") return "var(--scope-team-color)";
    if (scope === "personal") return "var(--scope-personal-color)";
    if (scope.startsWith("project:")) return "var(--scope-project-color)";

  }

    if (scope === "team") return "团队通用 · Team";

    if (scope.startsWith("project:")) return "项目专属 · " + scope.slice("project:".length).toUpperCase();
    return scope;
  }

  function getScopeRank(scope) {
    if (scope === "team") return [0, ""];
    if (scope.startsWith("project:")) return [1, scope];
    if (scope === "personal") return [2, ""];
    return [3, scope];

  // HTML escaping
  const esc = (s) => s.replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  // Inline markdown renderer
  function inline(text) {
    let s = esc(text);
    s = s.replace(/`([^`]+)`/g, (_, c) => "<code>" + c + "</code>");
    s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/(^|[\s(])\*([^*\s][^*]*?)\*(?=[\s).,]|$)/g, "$1<em>$2</em>");
    s = s.replace(/(^|[\s(])_([^_\s][^_]*?)_(?=[\s).,]|$)/g, "$1<em>$2</em>");
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    return s;
  }

  // Full structural markdown block parser
  function renderMarkdown(md) {
    const lines = md.replace(/\r\n/g, "\n").split("\n");

    let i = 0;
    
    const flushList = (buf, ordered) => {
      if (!buf.length) return;
      out.push("<" + (ordered ? "ol" : "ul") + ">" + buf.map((x) => "<li>" + inline(x) + "</li>").join("") + "</" + (ordered ? "ol" : "ul") + ">");
      buf.length = 0;
    };

    while (i < lines.length) {
      const line = lines[i];

      // 1. Code Block ```
      const fence = /^```(\w*)\s*$/.exec(line);
      if (fence) {
        const lang = fence[1] || "plaintext";
        const codeLines = [];
        i++;
        while (i < lines.length && !/^```\s*$/.test(lines[i])) {
          codeLines.push(lines[i]);
          i++;
        }
        i++; // Skip closing fence
        
        const codeRows = codeLines.map((ln, idx) => {
          return `<div class="code-line"><span class="line-num">${idx + 1}</span><span class="line-content">${esc(ln)}</span></div>`;
        }).join("");

        out.push(
          `<div class="terminal-code-block">` +
            `<div class="code-header">` +
              `<span class="dots"><span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span></span>` +
              `<span class="code-lang">${lang.toUpperCase()}</span>` +
              `<button class="copy-btn" onclick="copyCodeBlock(this)">COPY</button>` +
            `</div>` +
            `<pre><code>${codeRows}</code></pre>` +
          `</div>`
        );
        continue;
      }

      // 2. Headings h1 - h4
      const heading = /^(#{1,4})\s+(.*)$/.exec(line);
      if (heading) {
        const level = heading[1].length;
        out.push(`<h${level}>` + inline(heading[2]) + `</h${level}>`);
        i++;
        continue;
      }

      // 3. Unordered Lists
      if (/^\s*[-*+]\s+/.test(line)) {
        const buf = [];
        while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
          buf.push(lines[i].replace(/^\s*[-*+]\s+/, ""));
          i++;
        }
        flushList(buf, false);
        continue;
      }

      // 4. Ordered Lists
      if (/^\s*\d+\.\s+/.test(line)) {
        const buf = [];
        while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
          buf.push(lines[i].replace(/^\s*\d+\.\s+/, ""));
          i++;
        }
        flushList(buf, true);
        continue;
      }

      // 5. Quotes
      if (/^\s*>\s?/.test(line)) {
        const buf = [];
        while (i < lines.length && /^\s*>\s?/.test(lines[i])) {
          buf.push(lines[i].replace(/^\s*>\s?/, ""));
          i++;
        }
        out.push("<blockquote>" + inline(buf.join(" ")) + "</blockquote>");
        continue;
      }

      // 6. Horizontal Rules
      if (/^\s*(-{3,}|\*{3,})\s*$/.test(line)) {
        out.push("<hr />");
        i++;
        continue;
      }

      // 7. Markdown Tables
      if (line.trim().startsWith("|")) {
        const tableLines = [];
        while (i < lines.length && lines[i].trim().startsWith("|")) {
          tableLines.push(lines[i].trim());
          i++;
        }
        if (tableLines.length >= 2) {
          let tableHtml = "<table>";
          // Header Row
          const headers = tableLines[0].split("|").slice(1, -1).map(h => h.trim());
          tableHtml += "<thead><tr>" + headers.map(h => `<th>${inline(h)}</th>`).join("") + "</tr></thead>";
          // Body Rows
          tableHtml += "<tbody>";
          for (let j = 2; j < tableLines.length; j++) {
            const cells = tableLines[j].split("|").slice(1, -1).map(c => c.trim());
            tableHtml += "<tr>" + cells.map(c => `<td>${inline(c)}</td>`).join("") + "</tr>";
          }
          tableHtml += "</tbody></table>";
          out.push(tableHtml);
          continue;
        }
      }

      // Skip Blank Lines
      if (line.trim() === "") {
        i++;
        continue;
      }

      // 8. Standard Paragraphs
      const para = [];
      while (i < lines.length && lines[i].trim() !== "" && !/^(#{1,4}\s|```|\s*[-*+]\s|\s*\d+\.\s|\s*>|\s*-{3,}\s*$|\|)/.test(lines[i])) {
        para.push(lines[i]);
        i++;
      }
      out.push("<p>" + inline(para.join(" ")) + "</p>");
    }

    return out.join("\n");
  }

  // Prefix Query Checker (scope: type: tag: maturity: support)
  function matchesQuery(entry, q) {
    if (!q) return true;
    
    const parts = q.split(/\s+/);
    return parts.every(part => {
      if (!part) return true;
      
      if (part.includes(":")) {
        const [prefix, val] = part.split(":");
        if (!val) return true;
        
        if (prefix === "scope") {
          return entry.scope.toLowerCase().includes(val.toLowerCase());
        }
        if (prefix === "type") {
          const typeLabel = TYPE_LABEL[entry.type] || entry.type;
          return entry.type.toLowerCase().includes(val.toLowerCase()) || typeLabel.toLowerCase().includes(val.toLowerCase());
        }
        if (prefix === "tag") {
          return (entry.tags || []).some(t => t.toLowerCase().includes(val.toLowerCase()));
        }
        if (prefix === "maturity") {
          return (entry.maturity || "").toLowerCase().includes(val.toLowerCase());
        }
      }
      
      const hay = (entry.id + " " + entry.title + " " + entry.scope + " " + entry.type + " " + (entry.tags || []).join(" ")).toLowerCase();
      return hay.includes(part);
    });
  }

  // Hierarchical Directory Tree Rendering
  function renderTreeSidebar(visible, sidebar) {
    const tree = {};
    for (const e of visible) {
      if (!tree[e.scope]) tree[e.scope] = {};
      if (!tree[e.scope][e.type]) tree[e.scope][e.type] = [];
      tree[e.scope][e.type].push(e);
    }
    
    const sortedScopes = Object.keys(tree).sort((a, b) => {
      const ra = getScopeRank(a), rb = getScopeRank(b);
      return ra[0] - rb[0] || ra[1].localeCompare(rb[1]);
    });
    
    for (let sIdx = 0; sIdx < sortedScopes.length; sIdx++) {
      const scope = sortedScopes[sIdx];
      const scopeColor = getScopeColor(scope);
      const typesObj = tree[scope];
      
      const activeTypes = Object.keys(typesObj).sort((a, b) => {
        return TYPE_SORT_ORDER.indexOf(a) - TYPE_SORT_ORDER.indexOf(b);
      });
      
      let scopeTotalCount = 0;
      for (const t of activeTypes) {
        scopeTotalCount += typesObj[t].length;
      }
      
      const isScopeCollapsed = state.collapsedScopes.has(scope);
      const scopeRow = document.createElement("div");
      scopeRow.className = "tree-row scope";
      scopeRow.style.borderLeft = `3px solid ${scopeColor}`;
      
      const scopeType = scope.startsWith("project:") ? "project" : scope;
      
      scopeRow.innerHTML = `
        <span class="tree-toggle-icon">${isScopeCollapsed ? "▶" : "▼"}</span>
        <span class="scope-icon" style="color:${scopeColor}">${SVG[scopeType] || SVG.project}</span>
        <span class="tree-label">${esc(scopeLabel(scope))}</span>
        <span class="tree-badge" style="background: ${scopeColor}16; color: ${scopeColor}">${scopeTotalCount}</span>
      `;
      
      scopeRow.addEventListener("click", () => {
        if (state.collapsedScopes.has(scope)) {
          state.collapsedScopes.delete(scope);
        } else {
          state.collapsedScopes.add(scope);
        }
        renderSidebar();
      });
      sidebar.appendChild(scopeRow);
      
      if (isScopeCollapsed) continue;
      
      for (let tIdx = 0; tIdx < activeTypes.length; tIdx++) {
        const type = activeTypes[tIdx];
        const entries = typesObj[type].sort((a, b) => a.id.localeCompare(b.id));
        
        const typeId = `${scope}:${type}`;
        const isTypeCollapsed = state.collapsedTypes.has(typeId);
        const typeRow = document.createElement("div");
        typeRow.className = "tree-row type";

        const typeColor = getTypeColor(type);

        typeRow.innerHTML = `
          <span class="tree-toggle-icon">${isTypeCollapsed ? "▸" : "▾"}</span>
          <span class="tree-label" style="color:${typeColor}">
            <span class="type-icon">${SVG[type] || SVG.decisions}</span>
            <span>[${esc(TYPE_LABEL[type] || type).toUpperCase()}]</span>
          </span>
          <span class="tree-badge">(${entries.length})</span>
        `;
        
        typeRow.addEventListener("click", (evt) => {
          evt.stopPropagation();
          if (state.collapsedTypes.has(typeId)) {
            state.collapsedTypes.delete(typeId);
          } else {
            state.collapsedTypes.add(typeId);
          }
          renderSidebar();
        });
        sidebar.appendChild(typeRow);
        
        if (isTypeCollapsed) continue;
        
        for (let eIdx = 0; eIdx < entries.length; eIdx++) {
          const entry = entries[eIdx];
          const entryRow = document.createElement("div");
          const isActive = entry.id === state.selectedId;
          entryRow.className = `tree-row entry ${isActive ? 'active' : ''}`;

          let maturityClass = entry.maturity ? `maturity-${entry.maturity}` : "";

          entryRow.innerHTML = `
            <span class="tree-iid">${esc(entry.id)}</span>
            <span class="tree-title">${esc(entry.title)}</span>
            ${entry.maturity ? `<span class="tree-maturity-indicator ${maturityClass}" title="成熟度: ${entry.maturity}"></span>` : ''}
          `;
          
          entryRow.addEventListener("click", (evt) => {
            evt.stopPropagation();
            selectEntry(entry.id);
          });
          
          sidebar.appendChild(entryRow);
          state.visibleEntryIds.push(entry.id);
        }
      }
    }
  }

  // Sorted Flat List Rendering
  function renderFlatSidebar(visible, sidebar) {
    if (state.sort === "id") {
      visible.sort((a, b) => a.id.localeCompare(b.id));
    } else if (state.sort === "recent") {
      visible.sort((a, b) => {
        const da = a.createdAt ? new Date(a.createdAt) : new Date(0);
        const db = b.createdAt ? new Date(b.createdAt) : new Date(0);
        return db - da || a.id.localeCompare(b.id);
      });
    } else if (state.sort === "maturity") {
      const maturityOrder = { proven: 0, verified: 1, draft: 2 };
      visible.sort((a, b) => {
        const ma = maturityOrder[a.maturity] !== undefined ? maturityOrder[a.maturity] : 3;
        const mb = maturityOrder[b.maturity] !== undefined ? maturityOrder[b.maturity] : 3;
        return ma - mb || a.id.localeCompare(b.id);
      });
    }
    
    for (const entry of visible) {
      const scopeColor = getScopeColor(entry.scope);
      const scopeType = entry.scope.startsWith("project:") ? "project" : entry.scope;
      
      const row = document.createElement("div");
      const isActive = entry.id === state.selectedId;
      row.className = `tree-row entry flat-row ${isActive ? 'active' : ''}`;
      
      const scopeIcon = SVG[scopeType] || SVG.project;
      let maturityClass = entry.maturity ? `maturity-${entry.maturity}` : "";
      const tLabel = TYPE_LABEL[entry.type] || entry.type;
      
      row.innerHTML = `
        <span class="flat-scope-icon" style="color: ${scopeColor}" title="${esc(scopeLabel(entry.scope))}">${scopeIcon}</span>
        <span class="tree-iid">${esc(entry.id)}</span>
        <span class="flat-type-badge" style="color: var(--type-${entry.type.slice(0,-1)}-color); background: var(--type-${entry.type.slice(0,-1)}-bg)">${esc(tLabel.toUpperCase())}</span>
        <span class="tree-title" title="${esc(entry.title)}">${esc(entry.title)}</span>
        ${entry.maturity ? `<span class="tree-maturity-indicator ${maturityClass}" title="成熟度: ${entry.maturity}"></span>` : ''}
      `;
      
      row.addEventListener("click", () => {
        selectEntry(entry.id);
      });
      
      sidebar.appendChild(row);
      state.visibleEntryIds.push(entry.id);
    }
  }

  // Sidebar General Router
  function renderSidebar() {
    const q = state.query.trim().toLowerCase();
    const visible = state.entries.filter((e) => matchesQuery(e, q));
    
    const sidebar = document.getElementById("sidebar-list");
    sidebar.innerHTML = "";
    state.visibleEntryIds = [];
    
    if (!visible.length) {
      sidebar.innerHTML = '<div class="empty-sidebar">无匹配知识条目</div>';
      return;
    }

    if (state.sort === "tree") {
      renderTreeSidebar(visible, sidebar);
    } else {
      renderFlatSidebar(visible, sidebar);
    }
  }

  // Active item selection
  function selectEntry(id) {
    state.selectedId = id;
    const e = state.byId.get(id);
    if (e) {
      renderEntry(e);
    } else {
      renderDashboard();
    }
    renderSidebar();
  }

  // Advanced tag filter
  window.filterByScope = (scope) => {
    setSearchQuery(`scope:${scope}`);
  };

  window.filterByType = (type) => {
    setSearchQuery(`type:${type}`);
  };

  window.filterByTag = (tag) => {
    setSearchQuery(`tag:${tag}`);
  };

  function setSearchQuery(val) {
    const searchInput = document.getElementById("search");
    searchInput.value = val;
    state.query = val;
    updateQuickFilterUI(val);
    renderSidebar();
    
    const q = val.trim().toLowerCase();
    const visible = state.entries.filter((e) => matchesQuery(e, q));
    if (visible.length) {
      const alreadySelectedVisible = visible.some(e => e.id === state.selectedId);
      if (!alreadySelectedVisible) {
        selectEntry(visible[0].id);
      }
    } else {
      selectEntry(null);
    }
  }

  function updateQuickFilterUI(query) {
    const btns = document.querySelectorAll(".filter-btn");
    btns.forEach(btn => {
      const filterVal = btn.getAttribute("data-filter");
      if (filterVal === query) {
        btn.classList.add("active");
      } else if (filterVal === "scope:project:" && query.startsWith("scope:project:")) {
        btn.classList.add("active");
      } else {
        btn.classList.remove("active");
      }
    });
  }

  function setStatus(text, live) {
    document.getElementById("statustext").textContent = text;
    document.getElementById("livedot").className = "dot" + (live ? " live" : "");
  }

  // Data Loading & Polling
  async function loadKnowledge() {
    try {
      const res = await fetch("/api/knowledge", { cache: "no-store" });
      const data = await res.json();
      state.entries = data.entries || [];
      state.byId = new Map(state.entries.map((e) => [e.id, e]));
      
      renderSidebar();
      
      if (state.selectedId && state.byId.has(state.selectedId)) {
        renderEntry(state.byId.get(state.selectedId));
      } else {
        renderDashboard();
      }
      
      setStatus(`${state.entries.length} 条知识 · 实时`, true);
    } catch (err) {
      setStatus("加载失败: " + err.message, false);
    }
  }

  async function pollRevision() {
    try {
      const res = await fetch("/api/revision", { cache: "no-store" });
      const { revision } = await res.json();
      if (state.revision !== null && revision !== state.revision) {
        await loadKnowledge();
      }
      state.revision = revision;
      setStatus(`${state.entries.length} 条知识 · 实时`, true);
    } catch (_) {
      setStatus("连接断开", false);
    }
  }

  // Keyboard Navigation Bindings
  window.addEventListener("keydown", (ev) => {
    // 1. "/" focuses search
    if (ev.key === "/" && document.activeElement !== document.getElementById("search")) {
      ev.preventDefault();
      const searchInput = document.getElementById("search");
      searchInput.focus();
      searchInput.select();
      return;
    }
    
    // 2. "Escape" blurs or resets search
    if (ev.key === "Escape") {
      const searchInput = document.getElementById("search");
      if (document.activeElement === searchInput) {
        searchInput.blur();
      } else {
        setSearchQuery("");
      }
      return;
    }

    // 3. ArrowUp/ArrowDown to select elements
    if (ev.key === "ArrowDown" || ev.key === "ArrowUp") {
      if (!state.visibleEntryIds.length) return;
      ev.preventDefault();
      
      let currIdx = state.visibleEntryIds.indexOf(state.selectedId);
      if (ev.key === "ArrowDown") {
        currIdx = (currIdx + 1) % state.visibleEntryIds.length;
      } else {
        currIdx = (currIdx - 1 + state.visibleEntryIds.length) % state.visibleEntryIds.length;
      }
      
      selectEntry(state.visibleEntryIds[currIdx]);
      
      setTimeout(() => {
        const activeRow = document.querySelector(".tree-row.entry.active") || document.querySelector(".tree-row.flat-row.active");
        if (activeRow) activeRow.scrollIntoView({ block: "nearest" });
      }, 0);
      return;
    }

    // 4. "Enter" fold/unfold scopes and types (Only in tree mode)
    if (ev.key === "Enter") {
      const searchInput = document.getElementById("search");
      if (document.activeElement === searchInput) {
        searchInput.blur();
        return;
      }
      if (state.sort === "tree" && state.selectedId) {
        const activeEntry = state.byId.get(state.selectedId);
        if (activeEntry) {
          const typeId = `${activeEntry.scope}:${activeEntry.type}`;
          if (state.collapsedTypes.has(typeId)) {
            state.collapsedTypes.delete(typeId);
          } else {
            state.collapsedTypes.add(typeId);
          }
          renderSidebar();
        }
      }
    }
  });

  // Search input events
  document.getElementById("search").addEventListener("input", (ev) => {
    state.query = ev.target.value;
    updateQuickFilterUI(ev.target.value);
    renderSidebar();
  });

  // Sort Toolbar Events
  document.querySelectorAll(".sort-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.sort = btn.getAttribute("data-sort");
      renderSidebar();
    });
  });

  // Quick Filter Button Click Router
  document.getElementById("quickfilters").addEventListener("click", (ev) => {
    const btn = ev.target.closest(".filter-btn");
    if (!btn) return;
    const filterValue = btn.getAttribute("data-filter");
    setSearchQuery(filterValue);
  });

  // Theme Toggler
  const themeBtn = document.getElementById("themebtn");
  function toggleTheme() {
    const currTheme = document.documentElement.getAttribute("data-theme") || "light";
    const nextTheme = currTheme === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", nextTheme);
    themeBtn.textContent = nextTheme === "dark" ? "☾ DARK" : "☀ LIGHT";
    localStorage.setItem("pcf-theme", nextTheme);
  }
  themeBtn.addEventListener("click", toggleTheme);

  // Initialize theme setting (Light theme default for Lumen)
  const initTheme = localStorage.getItem("pcf-theme") || "light";
  document.documentElement.setAttribute("data-theme", initTheme);
  themeBtn.textContent = initTheme === "dark" ? "☾ DARK" : "☀ LIGHT";

  // Bootstrapping
  loadKnowledge()
    .then(pollRevision)
    .catch((err) => setStatus("加载失败: " + err.message, false));
    
  setInterval(pollRevision, 4000);
})();
</script>
</body>
</html>
